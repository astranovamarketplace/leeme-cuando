<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="description" content="Versículos bíblicos para cada emoción. Léeme cuando te sientas..." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Léeme Cuando" />
  <title>Léeme Cuando Te Sientas</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #fff;
      color: #111;
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      overflow-x: hidden;
    }

    .screen { display: none; flex-direction: column; min-height: 100vh; }
    .screen.active { display: flex; }

    /* ── HOME ── */
    .rainbow-bar {
      height: 5px;
      background: linear-gradient(90deg, #D62828, #E07B39, #C9B800, #2A9D4E, #1565C0, #6A0DAD);
      width: 100%;
      flex-shrink: 0;
    }

    .votd-block {
      padding: 1.75rem 1.5rem 1.5rem;
      text-align: center;
      border-bottom: 1px solid #f0f0f0;
    }

    .votd-tag {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #999;
      font-weight: 500;
      margin-bottom: 12px;
    }

    .votd-quote {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 18px;
      line-height: 1.65;
      color: #111;
      margin-bottom: 10px;
    }

    .votd-ref {
      font-size: 11px;
      color: #aaa;
      letter-spacing: 0.5px;
    }

    .leeme-block {
      padding: 1.5rem 1.5rem 0.75rem;
      text-align: center;
    }

    .home-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      color: #111;
      line-height: 1.25;
    }

    .section-label {
      font-size: 9px;
      letter-spacing: 2.5px;
      color: #999;
      text-transform: uppercase;
      font-weight: 500;
      padding: 0.5rem 1.25rem 0.75rem;
      text-align: center;
    }

    .feelings-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 0 1.25rem 2rem;
    }

    .feeling-btn {
      border: 1.5px solid #eee;
      background: #fff;
      border-radius: 14px;
      padding: 1.1rem 0.75rem;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      text-align: center;
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    .feeling-btn::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
    }

    .feeling-btn.feliz::after     { background: #E8B800; }
    .feeling-btn.triste::after    { background: #2979C8; }
    .feeling-btn.ansioso::after   { background: #9C2BD4; }
    .feeling-btn.solo::after      { background: #1A8A5C; }
    .feeling-btn.enojado::after   { background: #CC2200; }
    .feeling-btn.agradecido::after{ background: #2A9D4E; }
    .feeling-btn.asustado::after  { background: #D06000; }
    .feeling-btn.confundido::after{ background: #555555; }

    .feeling-btn:active { transform: scale(0.97); background: #fafafa; }

    .feeling-emoji { font-size: 28px; }
    .feeling-name  { font-size: 14px; font-weight: 500; color: #111; }
    .feeling-desc  { font-size: 10px; color: #aaa; font-weight: 300; }

    /* ── VERSE SCREEN ── */
    #verse-screen { position: relative; }

    .color-accent-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      z-index: 2;
      transition: background 0.3s;
    }

    .verse-header {
      display: flex;
      align-items: center;
      padding: 1.1rem 1.25rem;
      border-bottom: 1px solid #eee;
      gap: 10px;
      margin-top: 4px;
    }

    .back-btn {
      background: none;
      border: none;
      font-size: 13px;
      cursor: pointer;
      color: #888;
      padding: 4px 8px 4px 0;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    .verse-feeling-label {
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #999;
      font-weight: 500;
      flex: 1;
      text-align: center;
    }

    .header-spacer { width: 52px; }

    .verse-body {
      flex: 1;
      padding: 2rem 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      text-align: center;
    }

    .verse-emoji-big { font-size: 48px; }

    .verse-accent-line {
      height: 3px;
      width: 40px;
      border-radius: 2px;
      transition: background 0.3s;
    }

    .verse-text {
      font-family: 'Playfair Display', serif;
      font-size: 21px;
      font-style: italic;
      line-height: 1.7;
      color: #111;
    }

    .verse-ref {
      font-size: 11px;
      color: #999;
      letter-spacing: 1px;
      font-weight: 500;
      text-transform: uppercase;
    }

    .prayer-section {
      border-top: 1px solid #f0f0f0;
      padding-top: 1.25rem;
      width: 100%;
    }

    .prayer-label {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #bbb;
      font-weight: 500;
      margin-bottom: 8px;
      text-align: center;
    }

    .prayer-text {
      font-size: 14px;
      line-height: 1.75;
      color: #555;
      font-weight: 300;
      text-align: center;
    }

    .verse-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      margin-top: auto;
      padding-top: 0.5rem;
    }

    .otro-btn {
      width: 100%;
      padding: 0.95rem;
      border: 1.5px solid #111;
      border-radius: 12px;
      background: #fff;
      color: #111;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }

    .otro-btn:active { background: #f5f5f5; }

    .back-home-btn {
      width: 100%;
      padding: 0.95rem;
      border: none;
      border-radius: 12px;
      background: #111;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }

    .back-home-btn:active { opacity: 0.8; }

    /* Desktop centering */
    @media (min-width: 480px) {
      body {
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
        min-height: 100vh;
      }
    }
  </style>
</head>
<body>

<!-- HOME -->
<div id="home-screen" class="screen active">
  <div class="rainbow-bar"></div>

  <div class="votd-block">
    <div class="votd-tag">Versículo del día</div>
    <div class="votd-quote" id="votd-text"></div>
    <div class="votd-ref" id="votd-ref"></div>
  </div>

  <div class="leeme-block">
    <div class="home-title">Léeme cuando<br>te sientas…</div>
  </div>

  <div class="section-label">¿Cómo estás hoy?</div>

  <div class="feelings-grid">
    <button class="feeling-btn feliz"      onclick="openFeeling('feliz')">      <span class="feeling-emoji">☀️</span> <span class="feeling-name">Feliz</span>        <span class="feeling-desc">Gratitud y gozo</span>        </button>
    <button class="feeling-btn triste"     onclick="openFeeling('triste')">     <span class="feeling-emoji">🌧️</span><span class="feeling-name">Triste</span>       <span class="feeling-desc">Consuelo y esperanza</span>  </button>
    <button class="feeling-btn ansioso"    onclick="openFeeling('ansioso')">    <span class="feeling-emoji">🌀</span> <span class="feeling-name">Ansioso/a</span>    <span class="feeling-desc">Paz interior</span>           </button>
    <button class="feeling-btn solo"       onclick="openFeeling('solo')">       <span class="feeling-emoji">🌙</span> <span class="feeling-name">Solo/a</span>        <span class="feeling-desc">Presencia y compañía</span>  </button>
    <button class="feeling-btn enojado"    onclick="openFeeling('enojado')">    <span class="feeling-emoji">🔥</span> <span class="feeling-name">Enojado/a</span>    <span class="feeling-desc">Calma y perdón</span>         </button>
    <button class="feeling-btn agradecido" onclick="openFeeling('agradecido')"> <span class="feeling-emoji">🌿</span> <span class="feeling-name">Agradecido/a</span> <span class="feeling-desc">Alabanza y plenitud</span>   </button>
    <button class="feeling-btn asustado"   onclick="openFeeling('asustado')">   <span class="feeling-emoji">⚡</span> <span class="feeling-name">Con miedo</span>     <span class="feeling-desc">Fortaleza y valor</span>      </button>
    <button class="feeling-btn confundido" onclick="openFeeling('confundido')"> <span class="feeling-emoji">🌫️</span><span class="feeling-name">Confundido/a</span> <span class="feeling-desc">Dirección y sabiduría</span> </button>
  </div>
</div>

<!-- VERSE -->
<div id="verse-screen" class="screen">
  <div class="color-accent-bar" id="color-accent-bar"></div>
  <div class="verse-header">
    <button class="back-btn" onclick="goBack()">← Volver</button>
    <div class="verse-feeling-label" id="verse-feeling-label"></div>
    <div class="header-spacer"></div>
  </div>
  <div class="verse-body">
    <div class="verse-emoji-big" id="verse-emoji"></div>
    <div class="verse-accent-line" id="verse-accent-line"></div>
    <div class="verse-text" id="verse-text"></div>
    <div class="verse-ref" id="verse-ref"></div>
    <div class="prayer-section">
      <div class="prayer-label">Oración</div>
      <div class="prayer-text" id="prayer-text"></div>
    </div>
    <div class="verse-actions">
      <button class="otro-btn" onclick="nextVerse()">Ver otro versículo</button>
      <button class="back-home-btn" onclick="goBack()">← Volver al inicio</button>
    </div>
  </div>
</div>

<script>
const verses = {

    {ref:'1 Pedro 1:8',text:'A quien aman sin haberlo visto; en quien creen, aunque no lo ven ahora. Así se alegran con una alegría indescriptible y gloriosa.',prayer:'Que mi fe produzca una alegría que el mundo no pueda explicar.'},

    {ref:'Romanos 12:12',text:'Alégrense en la esperanza, muestren paciencia en el sufrimiento, perseveren en la oración.',prayer:'Que mi alegría nazca de la esperanza que tengo en ti, Señor.'},

const colors  = {feliz:'#E8B800',triste:'#2979C8',ansioso:'#9C2BD4',solo:'#1A8A5C',enojado:'#CC2200',agradecido:'#2A9D4E',asustado:'#D06000',confundido:'#555555'};
const emojis  = {feliz:'☀️',triste:'🌧️',ansioso:'🌀',solo:'🌙',enojado:'🔥',agradecido:'🌿',asustado:'⚡',confundido:'🌫️'};
const labels  = {feliz:'Feliz',triste:'Triste',ansioso:'Ansioso / a',solo:'Solo / a',enojado:'Enojado / a',agradecido:'Agradecido / a',asustado:'Con miedo',confundido:'Confundido / a'};

let currentFeeling = null;
let currentIdx = 0;

function init() {
  const i = new Date().getDate() % votd.length;
  document.getElementById('votd-text').textContent = votd[i].text;
  document.getElementById('votd-ref').textContent  = '— ' + votd[i].ref;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function openFeeling(f) {
  currentFeeling = f;
  currentIdx = Math.floor(Math.random() * verses[f].length);
  renderVerse();
  showScreen('verse-screen');
}

function renderVerse() {
  const v = verses[currentFeeling][currentIdx];
  const c = colors[currentFeeling];
  document.getElementById('color-accent-bar').style.background    = c;
  document.getElementById('verse-feeling-label').textContent       = labels[currentFeeling];
  document.getElementById('verse-emoji').textContent               = emojis[currentFeeling];
  document.getElementById('verse-accent-line').style.background    = c;
  document.getElementById('verse-text').textContent                = v.text;
  document.getElementById('verse-ref').textContent                 = '— ' + v.ref;
  document.getElementById('prayer-text').textContent               = v.prayer;
}

function nextVerse() {
  const list = verses[currentFeeling];
  let next;
  do { next = Math.floor(Math.random() * list.length); } while (next === currentIdx && list.length > 1);
  currentIdx = next;
  renderVerse();
  window.scrollTo(0, 0);
}

function goBack() { showScreen('home-screen'); }

// Service Worker registration
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}

init();
</script>
